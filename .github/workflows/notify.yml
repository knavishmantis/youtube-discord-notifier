name: YouTube Upload Notifier

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:         # allow manual trigger

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit last_video_id.txt

    steps:
      - uses: actions/checkout@v4

      - name: Check for new video and notify Discord
        env:
          CHANNEL_ID: UC4_toGdH1h8QMd5w9eCnWdw
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Fetch RSS feed
          RSS=$(curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=$CHANNEL_ID")

          # Extract latest video ID and metadata
          LATEST_ID=$(echo "$RSS" | grep -o '<yt:videoId>[^<]*</yt:videoId>' | head -1 | sed 's/<[^>]*>//g')
          TITLE=$(echo "$RSS" | grep -o '<title>[^<]*</title>' | sed -n '2p' | sed 's/<[^>]*>//g')
          PUBLISHED=$(echo "$RSS" | grep -o '<published>[^<]*</published>' | head -1 | sed 's/<[^>]*>//g')
          THUMB="https://img.youtube.com/vi/$LATEST_ID/maxresdefault.jpg"
          URL="https://www.youtube.com/watch?v=$LATEST_ID"

          # Read last known video ID from file
          LAST_ID=""
          if [ -f last_video_id.txt ]; then
            LAST_ID=$(cat last_video_id.txt)
          fi

          echo "Latest video ID: $LATEST_ID"
          echo "Last known ID:   $LAST_ID"

          if [ "$LATEST_ID" = "$LAST_ID" ]; then
            echo "No new video. Done."
            exit 0
          fi

          echo "New video detected! Posting to Discord..."

          # Post embed to Discord
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": $(echo "$TITLE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))'),
                \"url\": \"$URL\",
                \"color\": 16711680,
                \"image\": { \"url\": \"$THUMB\" },
                \"footer\": { \"text\": \"New video just dropped 🎬\" },
                \"timestamp\": \"$PUBLISHED\"
              }]
            }"

          # Save latest video ID and commit
          echo "$LATEST_ID" > last_video_id.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_video_id.txt
          git commit -m "chore: update last video ID to $LATEST_ID"
          git push

          echo "Done!"
